apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-sample-app
  namespace: aiops
  labels:
    app: aiops-sample-app
    app.kubernetes.io/name: aiops-sample-app
    app.kubernetes.io/part-of: aiops-kubernetes
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: aiops-sample-app
  template:
    metadata:
      labels:
        app: aiops-sample-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: aiops-sample-app
          image: ${DOCKER_REGISTRY}/aiops-sample-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PROMETHEUS_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secrets
                  key: PROMETHEUS_URL
            - name: GRAFANA_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secrets
                  key: GRAFANA_URL
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

global:
  resolve_timeout: 5m

route:
  receiver: n8n-webhook
  group_by:
    - alertname
    - namespace
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - receiver: n8n-webhook
      continue: true

receivers:
  - name: n8n-webhook
    webhook_configs:
      - url: http://n8n.n8n.svc.cluster.local:5678/webhook/aiops-alerts
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: ${N8N_WEBHOOK_SECRET}

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - namespace
      - pod
